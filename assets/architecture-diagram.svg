<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise User Lifecycle Automation Architecture</title>
  <desc id="desc">Workflow from CSV or JSON input through validation, configuration mapping, lifecycle planning, mock Graph actions, SaaS payloads, and reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .box-blue { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .box-green { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 12; }
      .box-amber { fill: #fffbeb; stroke: #fbbf24; stroke-width: 2; rx: 12; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="520"/>
  <text class="title" x="54" y="62">Enterprise User Lifecycle Automation</text>
  <text class="subtitle" x="54" y="90">Simulation-first workflow for Microsoft 365 identity lifecycle planning</text>

  <rect class="box-blue" x="54" y="170" width="150" height="92"/>
  <text class="label" x="80" y="210">CSV / JSON</text>
  <text class="small" x="82" y="235">sample lifecycle input</text>

  <line class="arrow" x1="204" y1="216" x2="268" y2="216"/>

  <rect class="box" x="278" y="170" width="150" height="92"/>
  <text class="label" x="320" y="210">Validation</text>
  <text class="small" x="304" y="235">required fields</text>

  <line class="arrow" x1="428" y1="216" x2="492" y2="216"/>

  <rect class="box" x="502" y="170" width="170" height="92"/>
  <text class="label" x="536" y="202">Config mapping</text>
  <text class="small" x="531" y="228">groups, licenses,</text>
  <text class="small" x="544" y="246">tool access</text>

  <line class="arrow" x1="672" y1="216" x2="736" y2="216"/>

  <rect class="box-green" x="746" y="152" width="190" height="128"/>
  <text class="label" x="786" y="196">Lifecycle planner</text>
  <text class="small" x="780" y="222">onboarding or</text>
  <text class="small" x="789" y="240">offboarding</text>

  <path class="arrow" d="M936 190 C982 166, 1018 152, 1062 152"/>
  <path class="arrow" d="M936 242 C982 282, 1018 304, 1062 304"/>

  <rect class="box-amber" x="1072" y="108" width="170" height="92"/>
  <text class="label" x="1111" y="145">Mock Graph</text>
  <text class="small" x="1100" y="170">simulation actions</text>

  <rect class="box-amber" x="1072" y="280" width="170" height="92"/>
  <text class="label" x="1103" y="318">SaaS payloads</text>
  <text class="small" x="1101" y="343">tool provisioning</text>

  <path class="arrow" d="M1157 200 C1157 236, 1050 406, 928 406"/>
  <path class="arrow" d="M1072 326 C1018 338, 982 366, 928 406"/>

  <rect class="box-blue" x="718" y="360" width="210" height="92"/>
  <text class="label" x="764" y="398">Reports</text>
  <text class="small" x="756" y="423">Markdown and JSON</text>

  <text class="small" x="54" y="480">No live Microsoft Graph calls. No real tenants, secrets, company domains, or production endpoints.</text>
</svg>
